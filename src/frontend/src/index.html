<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <title>PitaSmart — Trazabilidad Agricola</title>

    <!-- PWA: viewport para dispositivos moviles de campo -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <!-- PWA: color de tema verde agricola -->
    <meta name="theme-color" content="#2e7d32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PitaSmart" />

    <!-- SEO y descripcion -->
    <meta name="description" content="PitaSmart: Trazabilidad Agrocalidad y rentabilidad de fincas. Funciona sin conexion." />
    <meta name="application-name" content="PitaSmart" />

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Iconos -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />

    <!-- Angular Material: fuente Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Angular Material: iconos Material Symbols -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
